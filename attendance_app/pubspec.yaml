name: attendance_app
description: "A new Flutter project with Liveness Detection."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # GPS & Location
  geolocator: ^11.0.0

  # Firebase Core & Auth
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0

  # QR Scanner
  mobile_scanner: ^5.1.0

  # Biometrics & Liveness
  camera: 0.10.6
  google_mlkit_face_detection: ^0.11.0
  image_picker: ^1.1.2

  # Backend & Storage
  supabase_flutter: ^2.8.0

  url_launcher: ^6.3.0
  # ✅ Video Conferencing
  jitsi_meet_flutter_sdk: any

  # ✅ Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  device_info_plus: ^12.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png